<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <!-- CSS externo -->
    <link rel="stylesheet" href="Style.Css"> 
</head>
<body>
    <main class = "login-container">
        <img src="logo_empresa_letra_v1.png" alt="Logo de la Empresa" class="logo">
        <h1>Iniciar Sesión</h1>
        <form action="#" method="post" class="login-form">
            <label for="username">Correo:</label>
            <input type="text" id="username" placeholder="Ingrese su correo" required>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Ingrese su contraseña" required>
            <button type="submit">Ingresar</button>
            <nav>
                <a href="recover.html">¿Olvidaste tu contraseña?</a>
            </nav>
            <hr>
            <nav>
                <a href="Register.html" class="btn-registrarse">Registrarse</a>
            </nav>

        </form>
    </main>
</body>
</html>
