<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="Style.Css">
</head>
<body>

    <main class="login-card">
        <header>
            <div class="logo-box">
            <img src="logo_empresa_letra_v1.png" alt="Logo SportClub">
        </div>

            <h2>Acceso</h2>
        </header>

        <form>
            <div class="grupo-input">
                <label for="email">Correo</label>
                <input id="email" name="email" type="email" placeholder="Ingrese su correo " required>
            </div>
            <div class="grupo-input">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" placeholder="Ingrese su contraseña " required>
            </div>

            <button type="submit">Ingresar</button>
        </form>

        <nav>
            <a href="#">¿Olvidaste tu contraseña?</a>
        </nav>
        
        <hr>
        <button class="register-button">Registrarse</button>

    </main>

</body>
</html>
</html>
