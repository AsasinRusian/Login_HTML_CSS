<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.Css">
</head>
<body>
    <main class="login-container">
        <img src="logo_empresa_letra_v1.png" alt="SportClub Logo" class="logo">
        
        <h2>Crear Cuenta</h2>

        <form id="registroForm">
            <label for="email">Correo Electrónico *</label>
            <input type="email" id="email" placeholder="nombre@correo.com" required>

            <label for="password">Contraseña *</label>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>

            <label for="nombre">Nombre Completo *</label>
            <input type="text" id="nombre" placeholder="Ingrese su nombre" required>
            
            <label for="nivel">Nivel de experiencia</label>
            <select id="nivel">
                <option value="principiante">Principiante</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
            </select>

            <button type="submit">Registrarse</button>
        </form>

        <p id="mensaje-exito" class="alert alert-success mt-3 d-none" role="alert">
            Registrado con éxito.
        </p>
        <nav><a href="index.html">Volver al login</a></nav>
    </main>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.classList.add('d-none');
            document.getElementById('mensaje-exito').classList.remove('d-none');
        });
    </script>
</body>
</html>
