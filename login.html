<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - SportClub</title>
    <link rel="stylesheet" href="Style.Css">
</head>
<body>
    <main class="login-container">
        <img src="logo_empresa_letra_v1.png" alt="Logo" class="logo">
        <h2>Acceso</h2>
        <form action="login.html">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="Ingrese su correo." required>
            
            <label>Contraseña</label>
            <input type="password" placeholder="Ingrese su contraseña." required>
            
            <button type="submit">Iniciar Sesión</button>
        </form>
        <nav>
            <a href="recover.html">¿Olvidaste tu contraseña?</a>
            <hr>
            <a href="register.html">¿No tienes cuenta? Regístrate</a>
        </nav>
    </main>
</body>
</html>
