<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.Css">
</head>
<body>
    <main class="login-container">
        <img src="logo_empresa_letra_v1.png" alt="Logo" class="logo">
        <h1>Recupera tu acceso</h1>
        <h2>Te enviaremos un enlace para restablecer tu contraseña. Revisa tu bandeja de entrada y spam.</h2>
        <form id="form">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="nombre@correo.com" required>
            <button type="submit">Enviar Enlace</button>
        </form>
        <div id="msg" class="alert alert-success mt-3 d-none">Enlace enviado con éxito.</div>
        <nav><a href="login.html">Volver al login</a></nav>
    </main>
    <script>
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            this.style.display = 'none';
            document.getElementById('msg').classList.remove('d-none');
        });
    </script>
</body>
</html>
