<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.Css">
</head>
<body>
    <main class="login-container">
        <img src="logo_empresa_letra_v1.png" alt="SportClub Logo" class="logo">
        
        <h2>Regristrarme</h2>

        <form id="registroForm">
            <label for="email">Correo Electrónico *</label>
            <input type="email" id="email" placeholder="nombre@correo.com" required>

            <label for="password">Contraseña *</label>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>

            <label for="password">Confirmar Contraseña *</label>
            <input type="password" id="confirm-password" placeholder="Mínimo 8 caracteres" required>

            <label for="tipo-documento">Tipo de documento *</label>
            <select id="tipo-documento-select">
                <option value="cedula">Cédula</option>
                <option value="pasaporte">Pasaporte</option>
            </select>

            <label for="password">Número de documento *</label>
            <input type="text" id="numero-documento" placeholder="12.345.678-9" required>

            <label for="nombre">Nombre Completo *</label>
            <input type="text" id="nombre" placeholder="Ingrese su nombre" required>

                        <label for="password">Número telefónico *</label>
            <input type="text" id="numero-telefono" placeholder="+569 123 456 789" required>

            <label for="fecha-nacimiento">Fecha de nacimiento *</label>
            <input type="text" id="fecha-nacimiento" placeholder="dd/mm/yyyy" required>

            <label for="nivel">Nivel de experiencia</label>
            <select id="nivel">
                <option value="principiante">Principiante</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
            </select>

            <button type="submit">Crear cuenta</button>
        </form>

        <p id="mensaje-exito" class="alert alert-success mt-3 d-none" role="alert">
            Registrado con éxito.
        </p>
        <nav><a href="login.html">Volver al login</a></nav>
    </main>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            this.classList.add('d-none');
            document.getElementById('mensaje-exito').classList.remove('d-none');
        });
    </script>
</body>
</html>
